name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyYAML pillow

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build portable package and installer
        run: python build_installer.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Sign installer (optional)
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_BASE64)) {
            Write-Host "Skipping code signing (WINDOWS_PFX_BASE64 not configured)."
            exit 0
          }
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $signtool) {
            Write-Host "signtool not found, skipping code signing."
            exit 0
          }
          Get-ChildItem dist\*-Setup.exe -ErrorAction SilentlyContinue | ForEach-Object {
            & $signtool sign /f $pfxPath /p $env:WINDOWS_PFX_PASSWORD /tr "http://timestamp.digicert.com" /td SHA256 /fd SHA256 $_.FullName
          }

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem dist\*.zip, dist\*-Setup.exe -ErrorAction SilentlyContinue
          if ($files) {
            $files | Get-FileHash -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash)  $([System.IO.Path]::GetFileName($_.Path))" } |
              Set-Content dist\SHA256SUMS.txt
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk dpkg-dev
          python -m pip install --upgrade pip
          pip install pyinstaller PyYAML pillow

      - name: Build portable + deb
        run: |
          chmod +x scripts/build-linux-wsl.sh scripts/build-linux-deb.sh
          ./scripts/build-linux-wsl.sh

      - name: Generate checksums
        run: |
          shopt -s nullglob
          files=(dist/*.zip dist/*.deb)
          if [ ${#files[@]} -gt 0 ]; then
            sha256sum "${files[@]}" > dist/SHA256SUMS-linux.txt
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('dist/*') != ''
        with:
          name: linux-dist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: needs.build-windows.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release notes
        id: notes
        run: |
          notes="docs/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ -f "$notes" ]; then
            echo "path=$notes" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish assets (with release notes file)
        if: steps.notes.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            release-assets/windows-dist/**
            release-assets/linux-dist/**
          fail_on_unmatched_files: false

      - name: Publish assets (auto-generated notes)
        if: steps.notes.outputs.path == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/windows-dist/**
            release-assets/linux-dist/**
          fail_on_unmatched_files: false
